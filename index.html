<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>ogu_scan</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0b;
      --surface: #131316;
      --accent: #00e5a0;
      --text: #f0efe8;
      --muted: #6b6b78;
      --danger: #e5003a;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
      overflow: hidden;
      -webkit-user-select: none;
      user-select: none;
    }

    #app {
      display: flex;
      flex-direction: column;
      height: 100dvh;
    }

    /* Header */
    #header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px;
      padding-top: calc(12px + env(safe-area-inset-top));
      background: var(--surface);
      flex-shrink: 0;
      z-index: 10;
    }

    #logo {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    #logo span { color: var(--accent); }

    #page-count {
      font-size: 13px;
      color: var(--muted);
    }

    /* Camera view */
    #camera-wrap {
      flex: 1;
      position: relative;
      overflow: hidden;
      background: #000;
    }

    #video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    #overlay {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    /* Status pill */
    #status {
      position: absolute;
      top: 14px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 12px;
      font-weight: 500;
      color: var(--muted);
      background: rgba(10,10,11,0.72);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      padding: 5px 14px;
      border-radius: 20px;
      white-space: nowrap;
      transition: color 0.2s, background 0.2s;
      pointer-events: none;
    }

    #status.detecting { color: var(--accent); }
    #status.stable    { color: var(--accent); font-weight: 600; }
    #status.captured  { color: #0a0a0b; background: var(--accent); font-weight: 600; }

    /* Countdown ring */
    #countdown-wrap {
      position: absolute;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      width: 52px;
      height: 52px;
      opacity: 0;
      transition: opacity 0.2s;
      pointer-events: none;
    }

    #countdown-wrap.visible { opacity: 1; }

    #countdown-svg { transform: rotate(-90deg); }

    #countdown-track {
      fill: none;
      stroke: rgba(0,229,160,0.2);
      stroke-width: 4;
    }

    #countdown-ring {
      fill: none;
      stroke: var(--accent);
      stroke-width: 4;
      stroke-linecap: round;
      stroke-dasharray: 132;
      stroke-dashoffset: 132;
      transition: stroke-dashoffset 0.05s linear;
    }

    /* Filter label */
    #filter-label {
      position: absolute;
      bottom: 16px;
      right: 16px;
      font-size: 11px;
      color: rgba(255,255,255,0.5);
      background: rgba(0,0,0,0.45);
      padding: 3px 10px;
      border-radius: 10px;
      pointer-events: none;
    }

    /* Flash overlay */
    #flash {
      position: absolute;
      inset: 0;
      background: #fff;
      opacity: 0;
      pointer-events: none;
    }

    /* Permission / loading states */
    #loading, #permission-error {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      text-align: center;
      padding: 32px;
    }

    #loading { color: var(--muted); font-size: 14px; }
    #permission-error { display: none; }
    #permission-error.show { display: flex; }

    #permission-error p {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.7;
    }

    #retry-btn {
      padding: 12px 28px;
      background: var(--accent);
      color: #0a0a0b;
      border: none;
      border-radius: 24px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
    }

    /* Scan line animation */
    @keyframes scanline {
      0%   { top: 0%;   opacity: 0.9; }
      100% { top: 100%; opacity: 0; }
    }

    .scan-line {
      position: absolute;
      left: 0; right: 0;
      height: 2px;
      background: linear-gradient(transparent, var(--accent), transparent);
      animation: scanline 1.1s ease-in forwards;
      pointer-events: none;
      z-index: 5;
    }

    /* Bottom bar */
    #bottom-bar {
      background: var(--surface);
      padding: 10px 16px;
      padding-bottom: calc(10px + env(safe-area-inset-bottom));
      flex-shrink: 0;
    }

    /* Thumbnail strip */
    #thumb-strip {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 10px;
      scrollbar-width: none;
      min-height: 72px;
      align-items: center;
    }

    #thumb-strip::-webkit-scrollbar { display: none; }

    #thumb-strip:empty::before {
      content: 'スキャンした書類がここに表示されます';
      color: var(--muted);
      font-size: 11px;
      white-space: nowrap;
      margin: 0 auto;
    }

    .thumb {
      width: 52px;
      height: 68px;
      border-radius: 5px;
      overflow: hidden;
      flex-shrink: 0;
      position: relative;
      cursor: pointer;
      border: 1.5px solid transparent;
      transition: border-color 0.15s;
    }

    .thumb.selected { border-color: var(--accent); }

    .thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .thumb-del {
      position: absolute;
      top: 2px;
      right: 2px;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: var(--danger);
      color: #fff;
      font-size: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.15s;
      cursor: pointer;
    }

    .thumb.show-del .thumb-del { opacity: 1; }

    /* Controls row */
    #controls {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    /* Filter button */
    #filter-btn {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: rgba(255,255,255,0.08);
      border: none;
      color: var(--text);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
      letter-spacing: 0;
    }

    #filter-btn:active { background: rgba(255,255,255,0.15); }

    /* Shutter */
    #shutter {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      background: #fff;
      border: 4px solid var(--surface);
      outline: 2.5px solid rgba(255,255,255,0.25);
      cursor: pointer;
      transition: transform 0.1s, background 0.1s;
      flex-shrink: 0;
    }

    #shutter:active { transform: scale(0.91); background: #ddd; }

    /* Share / PDF button */
    #share-btn {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: var(--accent);
      border: none;
      color: #0a0a0b;
      font-size: 20px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.1s, opacity 0.2s;
      opacity: 0.3;
    }

    #share-btn:not([disabled]) { opacity: 1; cursor: pointer; }
    #share-btn:not([disabled]):active { transform: scale(0.91); }

    /* Toast */
    #toast {
      position: fixed;
      bottom: calc(110px + env(safe-area-inset-bottom));
      left: 50%;
      transform: translateX(-50%) translateY(10px);
      background: rgba(25,25,30,0.92);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      color: var(--text);
      padding: 8px 18px;
      border-radius: 20px;
      font-size: 13px;
      opacity: 0;
      transition: opacity 0.2s, transform 0.2s;
      pointer-events: none;
      white-space: nowrap;
      z-index: 100;
    }

    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>
<body>
<div id="app">
  <header id="header">
    <div id="logo">ogu<span>_scan</span></div>
    <div id="page-count">0 ページ</div>
  </header>

  <div id="camera-wrap">
    <div id="loading">カメラを起動中...</div>
    <video id="video" autoplay playsinline muted></video>
    <canvas id="overlay"></canvas>
    <div id="status">書類を探しています...</div>
    <div id="countdown-wrap">
      <svg id="countdown-svg" width="52" height="52" viewBox="0 0 52 52">
        <circle id="countdown-track" cx="26" cy="26" r="21"/>
        <circle id="countdown-ring"  cx="26" cy="26" r="21"/>
      </svg>
    </div>
    <div id="filter-label">オリジナル</div>
    <div id="flash"></div>
    <div id="permission-error">
      <p style="font-size:32px">📷</p>
      <p>カメラへのアクセスが<br>拒否されています。<br>設定から許可してください。</p>
      <button id="retry-btn" onclick="init()">再試行</button>
    </div>
  </div>

  <div id="bottom-bar">
    <div id="thumb-strip"></div>
    <div id="controls">
      <button id="filter-btn" onclick="cycleFilter()">AUTO</button>
      <button id="shutter" onclick="manualCapture()"></button>
      <button id="share-btn" onclick="generateAndShare()" disabled>↑</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script>
// ============================================================
// Constants
// ============================================================
const STABLE_THRESHOLD = 22;   // frames
const STABLE_MOVE_MAX  = 6;    // px (in process space)
const PROCESS_W        = 640;  // processing resolution width
const CAPTURE_MAX_W    = 1100; // max width for warp canvas
const EDGE_THRESHOLD   = 60;
const FILTERS = ['original', 'enhance', 'bw'];
const FILTER_LABEL = { original: 'オリジナル', enhance: '文書強調', bw: '白黒' };
const FILTER_BTN_TEXT = { original: 'AUTO', enhance: 'DOC', bw: 'B&W' };

// ============================================================
// State
// ============================================================
let stream       = null;
let animId       = null;
let pages        = [];
let stableFrames = 0;
let lastCorners  = null;
let isCapturing  = false;
let currentFilter = 'original';
let toastTimer;

// ============================================================
// DOM refs
// ============================================================
const video          = document.getElementById('video');
const overlay        = document.getElementById('overlay');
const octx           = overlay.getContext('2d');
const statusEl       = document.getElementById('status');
const countdownWrap  = document.getElementById('countdown-wrap');
const countdownRing  = document.getElementById('countdown-ring');
const flashEl        = document.getElementById('flash');
const thumbStrip     = document.getElementById('thumb-strip');
const pageCountEl    = document.getElementById('page-count');
const shareBtn       = document.getElementById('share-btn');
const filterBtn      = document.getElementById('filter-btn');
const filterLabel    = document.getElementById('filter-label');
const permError      = document.getElementById('permission-error');
const loadingEl      = document.getElementById('loading');

// Persistent process canvas (reused each frame)
const processCanvas = document.createElement('canvas');
const pctx = processCanvas.getContext('2d', { willReadFrequently: true });

// ============================================================
// Init & camera
// ============================================================
async function init() {
  permError.classList.remove('show');
  loadingEl.style.display = 'flex';
  try {
    if (stream) stream.getTracks().forEach(t => t.stop());
    stream = await navigator.mediaDevices.getUserMedia({
      video: {
        facingMode: { ideal: 'environment' },
        width:  { ideal: 1920 },
        height: { ideal: 1080 }
      },
      audio: false
    });
    video.srcObject = stream;
    await video.play();
    loadingEl.style.display = 'none';
    if (animId) cancelAnimationFrame(animId);
    loop();
  } catch {
    loadingEl.style.display = 'none';
    permError.classList.add('show');
  }
}

// ============================================================
// Main detection loop
// ============================================================
function loop() {
  animId = requestAnimationFrame(loop);
  if (video.readyState < 2) return;

  const vw = video.videoWidth;
  const vh = video.videoHeight;
  if (!vw || !vh) return;

  // Sync overlay to display size
  const dw = video.clientWidth;
  const dh = video.clientHeight;
  if (overlay.width !== dw || overlay.height !== dh) {
    overlay.width  = dw;
    overlay.height = dh;
  }

  // Draw video to process canvas (640px wide, aspect-correct)
  const pw = PROCESS_W;
  const ph = Math.round(vh / vw * pw);
  if (processCanvas.width !== pw || processCanvas.height !== ph) {
    processCanvas.width  = pw;
    processCanvas.height = ph;
  }
  pctx.drawImage(video, 0, 0, pw, ph);
  const imageData = pctx.getImageData(0, 0, pw, ph);

  const result = detectDocument(imageData.data, pw, ph);

  if (result.detected) {
    const displayCorners = result.corners.map(([x, y]) =>
      processToDisplay(x, y, pw, ph, vw, vh, dw, dh)
    );

    if (lastCorners) {
      const moved = avgDist(result.corners, lastCorners);
      if (moved < STABLE_MOVE_MAX) {
        stableFrames = Math.min(stableFrames + 1, STABLE_THRESHOLD);
      } else {
        stableFrames = Math.max(0, stableFrames - 3);
      }
    }
    lastCorners = result.corners;

    const stable = stableFrames >= STABLE_THRESHOLD;
    drawOverlay(displayCorners, stable);
    setStatus(stable ? 'stable' : 'detecting');
    setCountdown(stableFrames / STABLE_THRESHOLD);

    if (stable && !isCapturing) {
      captureDocument(result.corners, pw, ph, vw, vh);
    }
  } else {
    stableFrames = Math.max(0, stableFrames - 1);
    lastCorners  = null;
    octx.clearRect(0, 0, dw, dh);
    setStatus('searching');
    setCountdown(0);
  }
}

// ============================================================
// Coordinate mapping: process space -> display space
// ============================================================
function processToDisplay(px, py, pw, ph, vw, vh, dw, dh) {
  // Process -> video native
  const vx = px * vw / pw;
  const vy = py * vh / ph;

  // Video native -> display (object-fit: cover)
  const videoAspect     = vw / vh;
  const containerAspect = dw / dh;
  let scale, offX, offY;

  if (videoAspect > containerAspect) {
    // Video is wider: fit height, crop sides
    scale = dh / vh;
    offX  = (vw * scale - dw) / 2;
    offY  = 0;
  } else {
    // Video is taller: fit width, crop top/bottom
    scale = dw / vw;
    offX  = 0;
    offY  = (vh * scale - dh) / 2;
  }

  return [vx * scale - offX, vy * scale - offY];
}

// ============================================================
// Document detection
// ============================================================
function detectDocument(data, w, h) {
  // Grayscale
  const gray = new Uint8Array(w * h);
  for (let i = 0; i < gray.length; i++) {
    gray[i] = (data[i*4] * 77 + data[i*4+1] * 150 + data[i*4+2] * 29) >> 8;
  }

  // Sobel edge detection
  const edges = new Uint8Array(w * h);
  let edgeCount = 0;
  let minX = w, maxX = 0, minY = h, maxY = 0;

  for (let y = 1; y < h - 1; y++) {
    for (let x = 1; x < w - 1; x++) {
      const i = y * w + x;
      const gx = -gray[i-w-1] + gray[i-w+1]
                 - 2*gray[i-1] + 2*gray[i+1]
                 - gray[i+w-1] + gray[i+w+1];
      const gy = -gray[i-w-1] - 2*gray[i-w] - gray[i-w+1]
                 + gray[i+w-1] + 2*gray[i+w] + gray[i+w+1];
      const mag = Math.sqrt(gx*gx + gy*gy);
      if (mag > EDGE_THRESHOLD) {
        edges[i] = 1;
        edgeCount++;
        if (x < minX) minX = x;
        if (x > maxX) maxX = x;
        if (y < minY) minY = y;
        if (y > maxY) maxY = y;
      }
    }
  }

  const regionW = maxX - minX;
  const regionH = maxY - minY;
  const relArea  = (regionW * regionH) / (w * h);
  const edgeDens = edgeCount / (w * h);

  if (relArea  < 0.12 || relArea  > 0.98) return { detected: false };
  if (edgeDens < 0.003 || edgeDens > 0.18) return { detected: false };
  if (regionW  < 60   || regionH  < 60)    return { detected: false };

  const corners = findCorners(edges, w, h, minX, maxX, minY, maxY);
  return { detected: true, corners };
}

// Find 4 document corners using extreme-point scoring
function findCorners(edges, w, h, minX, maxX, minY, maxY) {
  let tl = null, tr = null, bl = null, br = null;
  let tlS = Infinity, trS = -Infinity, blS = Infinity, brS = -Infinity;

  for (let y = Math.max(1, minY); y <= Math.min(h-2, maxY); y++) {
    for (let x = Math.max(1, minX); x <= Math.min(w-2, maxX); x++) {
      if (!edges[y * w + x]) continue;
      const s1 = x + y;  // top-left: min, bottom-right: max
      const s2 = x - y;  // top-right: max, bottom-left: min
      if (s1 < tlS) { tlS = s1; tl = [x, y]; }
      if (s1 > brS) { brS = s1; br = [x, y]; }
      if (s2 > trS) { trS = s2; tr = [x, y]; }
      if (s2 < blS) { blS = s2; bl = [x, y]; }
    }
  }

  return [
    tl || [minX, minY],
    tr || [maxX, minY],
    br || [maxX, maxY],
    bl || [minX, maxY]
  ];
}

// ============================================================
// Capture
// ============================================================
async function captureDocument(corners, pw, ph, vw, vh) {
  isCapturing = true;
  stableFrames = 0;
  flashEffect();
  addScanLine();

  // Scale corners from process space to capture space
  const capW = Math.min(CAPTURE_MAX_W, vw);
  const capH = Math.round(capW * vh / vw);
  const sf = capW / pw;
  const scaledCorners = corners.map(([x, y]) => [x * sf, y * sf]);

  // Draw video at capture resolution
  const srcCanvas = document.createElement('canvas');
  srcCanvas.width  = capW;
  srcCanvas.height = capH;
  srcCanvas.getContext('2d').drawImage(video, 0, 0, capW, capH);

  const [tl, tr, br, bl] = scaledCorners;
  const outW = Math.round(Math.max(dist(tl, tr), dist(bl, br)));
  const outH = Math.round(Math.max(dist(tl, bl), dist(tr, br)));
  const dst  = [[0,0],[outW,0],[outW,outH],[0,outH]];

  const H = computeHomography(scaledCorners, dst);
  const warped = warpPerspective(srcCanvas, H, outW, outH);
  const filtered = applyFilter(warped, currentFilter);

  addPage(filtered);
  setStatus('captured');
  setTimeout(() => setStatus('searching'), 1200);
  isCapturing = false;
}

async function manualCapture() {
  if (isCapturing) return;
  isCapturing = true;
  flashEffect();

  const vw = video.videoWidth;
  const vh = video.videoHeight;
  const capW = Math.min(CAPTURE_MAX_W, vw);
  const capH = Math.round(capW * vh / vw);

  const srcCanvas = document.createElement('canvas');
  srcCanvas.width  = capW;
  srcCanvas.height = capH;
  srcCanvas.getContext('2d').drawImage(video, 0, 0, capW, capH);

  if (lastCorners) {
    const sf = capW / PROCESS_W;
    const scaledCorners = lastCorners.map(([x, y]) => [x * sf, y * sf]);
    const [tl, tr, br, bl] = scaledCorners;
    const outW = Math.round(Math.max(dist(tl, tr), dist(bl, br)));
    const outH = Math.round(Math.max(dist(tl, bl), dist(tr, br)));
    const H = computeHomography(scaledCorners, [[0,0],[outW,0],[outW,outH],[0,outH]]);
    const warped = warpPerspective(srcCanvas, H, outW, outH);
    addPage(applyFilter(warped, currentFilter));
  } else {
    addPage(applyFilter(srcCanvas, currentFilter));
  }

  isCapturing = false;
}

// ============================================================
// Perspective warp
// ============================================================
function warpPerspective(srcCanvas, H, outW, outH) {
  const out  = document.createElement('canvas');
  out.width  = outW;
  out.height = outH;

  if (!H) {
    out.getContext('2d').drawImage(srcCanvas, 0, 0, outW, outH);
    return out;
  }

  const Hinv = invertMat3(H);
  if (!Hinv) {
    out.getContext('2d').drawImage(srcCanvas, 0, 0, outW, outH);
    return out;
  }

  const oc = out.getContext('2d');
  const srcCtx  = srcCanvas.getContext('2d', { willReadFrequently: true });
  const srcData = srcCtx.getImageData(0, 0, srcCanvas.width, srcCanvas.height);
  const outData = oc.createImageData(outW, outH);
  const sw = srcCanvas.width;
  const sh = srcCanvas.height;
  const sd = srcData.data;
  const od = outData.data;

  for (let dy = 0; dy < outH; dy++) {
    for (let dx = 0; dx < outW; dx++) {
      const [sx, sy] = applyMat3(Hinv, dx, dy);
      if (sx < 0 || sx >= sw - 1 || sy < 0 || sy >= sh - 1) continue;

      const x0 = sx | 0, y0 = sy | 0;
      const fx = sx - x0, fy = sy - y0;
      const i00 = (y0 * sw + x0) * 4;
      const i10 = i00 + 4;
      const i01 = i00 + sw * 4;
      const i11 = i01 + 4;
      const oi  = (dy * outW + dx) * 4;
      const w00 = (1-fx)*(1-fy), w10 = fx*(1-fy);
      const w01 = (1-fx)*fy,     w11 = fx*fy;

      od[oi]   = sd[i00]   * w00 + sd[i10]   * w10 + sd[i01]   * w01 + sd[i11]   * w11;
      od[oi+1] = sd[i00+1] * w00 + sd[i10+1] * w10 + sd[i01+1] * w01 + sd[i11+1] * w11;
      od[oi+2] = sd[i00+2] * w00 + sd[i10+2] * w10 + sd[i01+2] * w01 + sd[i11+2] * w11;
      od[oi+3] = 255;
    }
  }

  oc.putImageData(outData, 0, 0);
  return out;
}

// ============================================================
// Homography (DLT)
// ============================================================
function computeHomography(src, dst) {
  const A = [];
  for (let i = 0; i < 4; i++) {
    const [sx, sy] = src[i];
    const [dx, dy] = dst[i];
    A.push([-sx, -sy, -1,   0,   0,  0, dx*sx, dx*sy, dx]);
    A.push([  0,   0,  0, -sx, -sy, -1, dy*sx, dy*sy, dy]);
  }
  const h = gaussElim(A);
  if (!h) return null;
  return [[h[0],h[1],h[2]], [h[3],h[4],h[5]], [h[6],h[7],1]];
}

function gaussElim(A) {
  const n = 8;
  const M = A.map(r => [...r.slice(0,8), -r[8]]);
  for (let c = 0; c < n; c++) {
    let mxR = c, mxV = Math.abs(M[c][c]);
    for (let r = c+1; r < n; r++) {
      if (Math.abs(M[r][c]) > mxV) { mxV = Math.abs(M[r][c]); mxR = r; }
    }
    [M[c], M[mxR]] = [M[mxR], M[c]];
    if (Math.abs(M[c][c]) < 1e-10) return null;
    const inv = 1 / M[c][c];
    for (let j = c; j <= n; j++) M[c][j] *= inv;
    for (let r = 0; r < n; r++) {
      if (r === c) continue;
      const f = M[r][c];
      for (let j = c; j <= n; j++) M[r][j] -= f * M[c][j];
    }
  }
  return [...M.map(r => r[n]), 1];
}

function invertMat3([[a,b,c],[d,e,f],[g,h,k]]) {
  const det = a*(e*k-f*h) - b*(d*k-f*g) + c*(d*h-e*g);
  if (Math.abs(det) < 1e-10) return null;
  const id = 1/det;
  return [
    [(e*k-f*h)*id, (c*h-b*k)*id, (b*f-c*e)*id],
    [(f*g-d*k)*id, (a*k-c*g)*id, (c*d-a*f)*id],
    [(d*h-e*g)*id, (b*g-a*h)*id, (a*e-b*d)*id]
  ];
}

function applyMat3([[a,b,c],[d,e,f],[g,h,k]], x, y) {
  const w = g*x + h*y + k;
  return [(a*x + b*y + c)/w, (d*x + e*y + f)/w];
}

// ============================================================
// Filters
// ============================================================
function applyFilter(canvas, filter) {
  if (filter === 'original') return canvas;
  const out = document.createElement('canvas');
  out.width  = canvas.width;
  out.height = canvas.height;
  const c = out.getContext('2d');
  c.drawImage(canvas, 0, 0);
  const img = c.getImageData(0, 0, out.width, out.height);
  const d = img.data;
  for (let i = 0; i < d.length; i += 4) {
    const lum = (d[i]*77 + d[i+1]*150 + d[i+2]*29) >> 8;
    let v;
    if (filter === 'enhance') {
      v = lum > 155 ? Math.min(255, lum * 1.25 | 0) : Math.max(0, lum * 0.55 | 0);
    } else {
      v = lum > 145 ? 255 : 0;
    }
    d[i] = d[i+1] = d[i+2] = v;
  }
  c.putImageData(img, 0, 0);
  return out;
}

// ============================================================
// Page management
// ============================================================
function addPage(canvas) {
  pages.push(canvas);
  renderThumbs();
  updatePageCount();
  shareBtn.disabled = false;
  shareBtn.style.opacity = '1';
  showToast(`${pages.length} ページ追加`);
}

function renderThumbs() {
  thumbStrip.innerHTML = '';
  pages.forEach((canvas, i) => {
    const wrap = document.createElement('div');
    wrap.className = 'thumb';

    const img = document.createElement('img');
    img.src = canvas.toDataURL('image/jpeg', 0.65);

    const del = document.createElement('div');
    del.className = 'thumb-del';
    del.textContent = '×';
    del.onclick = e => { e.stopPropagation(); deletePage(i); };

    // Long-press to show delete on mobile
    let pressTimer;
    wrap.addEventListener('touchstart', () => {
      pressTimer = setTimeout(() => wrap.classList.add('show-del'), 500);
    }, { passive: true });
    wrap.addEventListener('touchend', () => clearTimeout(pressTimer), { passive: true });

    wrap.append(img, del);
    thumbStrip.append(wrap);
  });
  thumbStrip.scrollLeft = thumbStrip.scrollWidth;
}

function deletePage(i) {
  pages.splice(i, 1);
  renderThumbs();
  updatePageCount();
  if (pages.length === 0) {
    shareBtn.disabled = true;
    shareBtn.style.opacity = '0.3';
  }
  showToast('削除しました');
}

function updatePageCount() {
  pageCountEl.textContent = `${pages.length} ページ`;
}

// ============================================================
// PDF generation & share
// ============================================================
async function generateAndShare() {
  if (!pages.length) return;
  shareBtn.disabled = true;
  shareBtn.textContent = '…';
  showToast('PDF 生成中...');

  await new Promise(r => setTimeout(r, 30));

  const { jsPDF } = window.jspdf;
  let doc = null;

  for (let i = 0; i < pages.length; i++) {
    const c   = pages[i];
    const isL = c.width > c.height;
    const w   = c.width, h = c.height;
    const img = c.toDataURL('image/jpeg', 0.85);
    if (!doc) {
      doc = new jsPDF({ orientation: isL ? 'l' : 'p', unit: 'px', format: [w, h] });
    } else {
      doc.addPage([w, h], isL ? 'l' : 'p');
    }
    doc.addImage(img, 'JPEG', 0, 0, w, h);
  }

  const fileName = `scan_${pages.length}pages.pdf`;
  const blob = doc.output('blob');
  const file = new File([blob], fileName, { type: 'application/pdf' });

  if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
    try {
      await navigator.share({ files: [file], title: fileName });
      showToast('共有しました');
    } catch (e) {
      if (e.name !== 'AbortError') fallbackDownload(blob, fileName);
    }
  } else {
    fallbackDownload(blob, fileName);
  }

  shareBtn.disabled = false;
  shareBtn.textContent = '↑';
}

function fallbackDownload(blob, name) {
  const url = URL.createObjectURL(blob);
  const a   = document.createElement('a');
  a.href = url; a.download = name; a.click();
  URL.revokeObjectURL(url);
  showToast('PDF を保存しました');
}

// ============================================================
// Filter cycle
// ============================================================
function cycleFilter() {
  const idx = FILTERS.indexOf(currentFilter);
  currentFilter = FILTERS[(idx + 1) % FILTERS.length];
  filterBtn.textContent   = FILTER_BTN_TEXT[currentFilter];
  filterLabel.textContent = FILTER_LABEL[currentFilter];
  showToast(FILTER_LABEL[currentFilter]);
}

// ============================================================
// Overlay drawing
// ============================================================
function drawOverlay(corners, stable) {
  octx.clearRect(0, 0, overlay.width, overlay.height);
  const [tl, tr, br, bl] = corners;
  const t = Date.now();
  const alpha = stable ? 0.75 + 0.25 * Math.sin(t / 180) : 0.5;

  octx.save();
  octx.strokeStyle = `rgba(0,229,160,${alpha})`;
  octx.lineWidth   = 2;
  octx.setLineDash(stable ? [] : [8, 6]);

  octx.beginPath();
  octx.moveTo(...tl); octx.lineTo(...tr);
  octx.lineTo(...br); octx.lineTo(...bl);
  octx.closePath();
  octx.stroke();

  octx.fillStyle = 'rgba(0,229,160,0.06)';
  octx.fill();

  // Corner markers
  octx.setLineDash([]);
  octx.fillStyle = `rgba(0,229,160,${alpha})`;
  const m = 9;
  [tl, tr, br, bl].forEach(([x, y]) => {
    octx.fillRect(x - m/2, y - m/2, m, m);
  });

  octx.restore();
}

// ============================================================
// UI helpers
// ============================================================
function setStatus(state) {
  const labels = {
    searching: '書類を探しています...',
    detecting: '書類を検出中',
    stable:    '静止してください — 自動撮影します',
    captured:  'キャプチャ完了！'
  };
  statusEl.textContent = labels[state] || '';
  statusEl.className   = state;
}

function setCountdown(progress) {
  const circ = 132;
  countdownRing.style.strokeDashoffset = circ * (1 - progress);
  countdownWrap.classList.toggle('visible', progress > 0.01);
}

function flashEffect() {
  flashEl.style.transition = 'none';
  flashEl.style.opacity    = '0.85';
  requestAnimationFrame(() => {
    flashEl.style.transition = 'opacity 0.35s ease';
    flashEl.style.opacity    = '0';
  });
}

function addScanLine() {
  const line = document.createElement('div');
  line.className = 'scan-line';
  document.getElementById('camera-wrap').append(line);
  setTimeout(() => line.remove(), 1200);
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2600);
}

// ============================================================
// Utils
// ============================================================
function dist([x1,y1], [x2,y2]) {
  return Math.sqrt((x2-x1)**2 + (y2-y1)**2);
}

function avgDist(a, b) {
  return a.reduce((s, p, i) => s + dist(p, b[i]), 0) / a.length;
}

// ============================================================
// Start
// ============================================================
init();
</script>
